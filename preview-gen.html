<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300&family=Carattere&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #171717;
  }
  .wrap {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 52px 64px;
  }
  .line {
    display: block;
    line-height: 0.88;
    letter-spacing: -0.048em;
  }
  .accent {
    font-family: 'Carattere', cursive;
    font-style: italic;
    font-weight: 400;
    font-size: 122px;
    color: #e40202;
  }
  .body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 114px;
    color: #ffffff;
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="line">
      <span class="accent">M</span><span class="body">ultidisciplinary</span>
    </span>
    <span class="line">
      <span class="body">Designer</span>
    </span>
  </div>
</body>
</html>
